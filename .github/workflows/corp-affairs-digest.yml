name: Corp Affairs Calendar Digest

on:
  schedule:
    - cron: '0 14 * * MON'  # Every Monday at 9am ET (14:00 UTC)
  workflow_dispatch:          # Allows manual trigger from the Actions tab

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install smartsheet-python-sdk requests

      - name: Run digest script
        env:
          SMARTSHEET_API_TOKEN: ${{ secrets.SMARTSHEET_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python digest.py
